  // ---------- グローバル ----------
  let currentLang = 'jp';
  let currentTheme = 'dark';
  let showingDetail = false;
  let currentAnimeId = null;

  const mainPage = document.getElementById('mainPage');
  const detailPage = document.getElementById('detailPage');
  const animeGrid = document.getElementById('animeGrid');
  const detailContent = document.getElementById('detailContent');
  const themeToggle = document.getElementById('themeToggle');
  const langJpBtn = document.getElementById('langJp');
  const langEnBtn = document.getElementById('langEn');
  const langDeBtn = document.getElementById('LangDe');
  const backButton = document.getElementById('backButton');

  function speakText(text, langCode) {
    if (!text) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = langCode;
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    window.speechSynthesis.speak(utterance);
  }

  function setTheme(theme) {
    currentTheme = theme;
    if (theme === 'light') document.body.classList.add('light');
    else document.body.classList.remove('light');
    localStorage.setItem('animeTheme', theme);
  }

  function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('animeLang', lang);
    langJpBtn.classList.remove('active');
    langEnBtn.classList.remove('active');
    langDeBtn.classList.remove('active');
    if (lang === 'jp') langJpBtn.classList.add('active');
    else if (lang === 'en') langEnBtn.classList.add('active');
    else if (lang === 'de') langDeBtn.classList.add('active');
    
    if (!showingDetail) renderMainGrid();
    else renderDetailView(currentAnimeId);
  }

  function renderMainGrid() {
    animeGrid.innerHTML = '';
    animeData.forEach(anime => {
      let title = '';
      if (currentLang === 'jp') title = anime.title_jp;
      else if (currentLang === 'en') title = anime.title_en;
      else title = anime.title_de;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img class="card-img" src="${anime.image}" alt="${title}" loading="lazy" onerror="this.src='https://placehold.co/600x400/2d2d44/f97316?text=No+Image'">
        <div class="card-content">
          <div class="card-title">${escapeHtml(title)}</div>
          <div style="font-size:0.85rem; opacity:0.8;">${currentLang === 'jp' ? 'クリックで名言詳細' : (currentLang === 'en' ? 'Click for quote details' : 'Klicken für Zitatdetails')}</div>
        </div>
      `;
      card.addEventListener('click', () => showDetail(anime.id));
      animeGrid.appendChild(card);
    });
  }

  function renderDetailView(animeId) {
    const anime = animeData.find(a => a.id === animeId);
    if (!anime) return;
    currentAnimeId = animeId;
    
    let title = '', description = '', explanation = '', translatedQuote = '', quoteLangCode = '';
    if (currentLang === 'jp') {
      title = anime.title_jp;
      description = anime.description_jp;
      explanation = anime.explanation_jp;
      translatedQuote = anime.quote_jp;
      quoteLangCode = 'ja-JP';
    } else if (currentLang === 'en') {
      title = anime.title_en;
      description = anime.description_en;
      explanation = anime.explanation_en;
      translatedQuote = anime.quote_en;
      quoteLangCode = 'en-US';
    } else {
      title = anime.title_de;
      description = anime.description_de;
      explanation = anime.explanation_de;
      translatedQuote = anime.quote_de;
      quoteLangCode = 'de-DE';
    }
    
    const detailHtml = `
      <div class="detail-view">
        <img class="detail-img" src="${anime.image}" alt="${title}" onerror="this.src='https://placehold.co/800x400/2d2d44/f97316?text=Image+Not+Found'">
        <h2>${escapeHtml(title)}</h2>
        <p><strong>📖 ${currentLang === 'jp' ? '作品紹介' : (currentLang === 'en' ? 'Series Description' : 'Serienbeschreibung')}:</strong> ${escapeHtml(description)}</p>
        
        <div class="jp-romaji-block">
          <div class="jp-original">🇯🇵 ${escapeHtml(anime.quote_jp)}</div>
          <div class="romaji">🔊 <em>${escapeHtml(anime.quote_jp_romaji)}</em> (Romaji)</div>
        </div>
        
        <div style="background:#f43f5e20; padding:1rem; border-radius:1rem; margin:1rem 0;">
          <p><strong>💬 ${currentLang === 'jp' ? '名言' : (currentLang === 'en' ? 'Translated Quote' : 'Übersetztes Zitat')}:</strong><br>“${escapeHtml(translatedQuote)}”</p>
          <p><strong>📝 ${currentLang === 'jp' ? '解説' : (currentLang === 'en' ? 'Learning Point' : 'Erklärung')}:</strong> ${escapeHtml(explanation)}</p>
        </div>
        
        <div class="audio-buttons">
          <button class="audio-btn" id="speakJpBtn">🔊 日本語 (Romaji読み)</button>
          <button class="audio-btn" id="speakEnBtn">🔊 English</button>
          <button class="audio-btn" id="speakDeBtn">🔊 Deutsch</button>
        </div>
        
        <a href="${anime.official_url}" target="_blank" rel="noopener noreferrer" class="official-link">🔗 ${currentLang === 'jp' ? '公式サイト' : (currentLang === 'en' ? 'Official Site' : 'Offizielle Seite')}</a>
      </div>
    `;
    detailContent.innerHTML = detailHtml;
    
    document.getElementById('speakJpBtn')?.addEventListener('click', (e) => { e.stopPropagation(); speakText(anime.quote_jp, 'ja-JP'); });
    document.getElementById('speakEnBtn')?.addEventListener('click', (e) => { e.stopPropagation(); speakText(anime.quote_en, 'en-US'); });
    document.getElementById('speakDeBtn')?.addEventListener('click', (e) => { e.stopPropagation(); speakText(anime.quote_de, 'de-DE'); });
  }

  function showDetail(id) {
    showingDetail = true;
    renderDetailView(id);
    mainPage.classList.add('hidden');
    detailPage.classList.remove('hidden');
    window.scrollTo(0,0);
  }

  function goBack() {
    showingDetail = false;
    mainPage.classList.remove('hidden');
    detailPage.classList.add('hidden');
    renderMainGrid();
    window.scrollTo(0,0);
    window.speechSynthesis.cancel();
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  themeToggle.addEventListener('click', () => setTheme(currentTheme === 'dark' ? 'light' : 'dark'));
  langJpBtn.addEventListener('click', () => setLanguage('jp'));
  langEnBtn.addEventListener('click', () => setLanguage('en'));
  langDeBtn.addEventListener('click', () => setLanguage('de'));
  backButton.addEventListener('click', goBack);

  function init() {
    const savedTheme = localStorage.getItem('animeTheme');
    if (savedTheme === 'light') setTheme('light');
    else setTheme('dark');
    const savedLang = localStorage.getItem('animeLang');
    if (savedLang === 'en') setLanguage('en');
    else if (savedLang === 'de') setLanguage('de');
    else setLanguage('jp');
    renderMainGrid();
  }
  init();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => console.log('SW registered', reg)).catch(err => console.log('SW failed', err));
  }
</script>
